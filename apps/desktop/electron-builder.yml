electronVersion: "35.0.0"
appId: com.coodeen.desktop
productName: Coodeen
npmRebuild: false
asar: false
directories:
  buildResources: build
  output: release
  app: .
files:
  - "**/*"
  - "!src"
  - "!release"
  - "!node_modules"
  - "!*.ts"
  - "!*.yml"
mac:
  category: public.app-category.developer-tools
  artifactName: "Coodeen-mac-${arch}.${ext}"
  target:
    - dmg
    - zip
dmg:
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
publish:
  provider: github
  owner: zahinafsar
  repo: coodeen
  releaseType: release
