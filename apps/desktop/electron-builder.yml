electronVersion: "35.0.0"
appId: com.coodeen.desktop
productName: Coodeen
directories:
  buildResources: build
  output: release
files:
  - out/**/*
mac:
  category: public.app-category.developer-tools
  artifactName: "Coodeen-mac-${arch}.${ext}"
  target:
    - dmg
    - zip
win:
  artifactName: "Coodeen-Setup.${ext}"
  target:
    - nsis
linux:
  artifactName: "Coodeen-linux.${ext}"
  target:
    - AppImage
publish:
  provider: github
  owner: zahinafsar
  repo: coodeen
  releaseType: release
